name: Build Windows Executable

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, labeled]
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: 'Upload artifact even on non-tag builds'
        required: false
        default: 'true'
        type: boolean

env:
  PYTHON_VERSION: '3.12'
  EXE_NAME: smf-forge-desktop.exe

jobs:
  build-windows:
    runs-on: windows-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'build-exe')

    steps:
      # ------------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------------
      # Python
      # ------------------------------------------------------------------
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ------------------------------------------------------------------
      # Install dependencies
      # ------------------------------------------------------------------
      - name: Upgrade build tools
        run: python -m pip install --upgrade pip wheel setuptools

      - name: Install core + build dependencies
        run: |
          python -m pip install openai anthropic httpx rich tenacity prompt_toolkit pyyaml requests jinja2 pydantic fire python-dotenv
          python -m pip install edge-tts faster-whisper litellm typer platformdirs PyJWT fal-client firecrawl-py parallel-web croniter
          python -m pip install python-telegram-bot discord.py aiohttp slack-bolt slack-sdk
          python -m pip install pytest pytest-asyncio pytest-xdist mcp pyinstaller black

      # ------------------------------------------------------------------
      # Lint / safety checks
      # ------------------------------------------------------------------
      - name: Quick import smoke test
        shell: pwsh
        run: |
          python -c "import gui.app; import cli; import run_agent; print('Import OK')"

      - name: Run security regression tests
        shell: pwsh
        run: python -m unittest tests.p1_security_fixes -v
        continue-on-error: true

      # ------------------------------------------------------------------
      # Build
      # ------------------------------------------------------------------
      - name: Build executable with PyInstaller
        shell: pwsh
        run: pyinstaller smf-forge-desktop.spec --clean --noconfirm

      - name: Verify output
        shell: pwsh
        run: |
          $exe = "dist\smf-forge-desktop.exe"
          if (!(Test-Path $exe)) { throw "Build failed — $exe not found" }
          $item = Get-Item $exe
          $mb = [math]::Round($item.Length / 1MB, 2)
          Write-Host "Executable: $($item.Name)"
          Write-Host "Size: $mb MB"
          Write-Host "Modified: $($item.LastWriteTime)"

      # ------------------------------------------------------------------
      # Artifact upload
      # ------------------------------------------------------------------
      - name: Upload artifact
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
            || github.event.inputs.upload_artifact == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: smf-forge-desktop-${{ github.ref_name || github.sha }}
          path: dist/${{ env.EXE_NAME }}
          retention-days: 30
          if-no-files-found: error

      # ------------------------------------------------------------------
      # Release (tag pushes only)
      # ------------------------------------------------------------------
      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.EXE_NAME }}
          generate_release_notes: true
          body: |
            ## SMF Forge Desktop ${{ github.ref_name }}

            **Windows onefile executable** — no install, no admin rights, no Docker required.

            ### Quick Start
            1. Download `smf-forge-desktop.exe` below.
            2. Double-click to launch.
            3. On first run, it auto-installs an embedded Python 3.13 + dependencies (~2 min, one-time).

            ### Security
            See [SECURITY.md](https://github.com/${{ github.repository }}/blob/main/SECURITY.md) for current posture and vulnerability reporting.
            - Posture: **8/10** — all P1 vulnerabilities addressed.
            - Latest audit: [AUDIT_REPORT_2026-04-29.md](https://github.com/${{ github.repository }}/blob/main/AUDIT_REPORT_2026-04-29.md)

            ### Changelog
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
